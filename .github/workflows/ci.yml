name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build (Maven)
        run: mvn -B clean package -DskipTests

      - name: Smoke test (compile a CL program through the CLI)
        run: |
          printf 'startProgram\n  variables:\n    int n = 5;\n    int f = 1;\n  code:\n    loopif n > 0 holds\n      f = f * n;\n      n = n - 1;\n    endloop\n    outString(f);\nendProgram\n' \
            | java -cp target/cl-compiler-1.0.0.jar cl.CLCompiler

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: cl-compiler-jar
          path: target/cl-compiler-1.0.0.jar
